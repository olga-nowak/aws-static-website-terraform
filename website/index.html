<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
        <link href="index.css" rel="stylesheet">
        <title>Company Name</title>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelector('#yes').addEventListener('click', function(event) {
                    document.querySelector('#answer').innerHTML = "Great! Maybe you could tell me more about it via e-mail?";
                    });
                });

            document.addEventListener('DOMContentLoaded', function() {
                document.querySelector('#no').addEventListener('click', function(event) {
                    document.querySelector('#answer').innerHTML = "Maybe you'll like one of mines, who knows?";
                    });
                });

        </script>
    </head>
    <body>
        <div class="header">
            <div class="text-success">
                <hr>
            </div>
            <h1>
                Company Name
            </h1>
            <h4>This page is about our company</h4>
            <div class="text-success">
                <hr>
            </div>
        </div>

        <div class="container">
                <p>Want to learn more?</p>
                <p>
                    <button id="yes">Sure!</button>
                    <button id="no">Maybe later</button>
                </p>
                <p id="answer"></p>
        </div>

        <div class="container">
            <h5>
                You'll love us! This is why:
            </h5>
        </div>

        <div class="container text-center">
            <div class="row">
                <div class="col-4">
                    <image src="family.avif" class="img-thumbnail" alt="Family" width="200" height="200">
                </div>
                <div class="col-8">
                    <div class="container">
                        Family business is more than just company
                    </div>
                </div>
            </div>
        </div>

        <div class="container text-center">
            <div class="row">
                <div class="col-4">
                    <image src="study.webp" class="img-thumbnail" alt="Picture of an android" width="200" height="200">
                </div>
                <div class="col-8">
                    <div class="container">
                        Innovation makes the best
                    </div>
                </div>
            </div>
        </div>

        <div class="container text-center">
            <div class="row">
                <div class="col-4">
                    <image src="sport.png" class="img-thumbnail" alt="Woman with dumbbells" width="200" height="200">
                </div>
                <div class="col-8">
                    <div class="container">
                        Why healthy lifestyle is important
                    </div>
                </div>
            </div>
        </div>

        <div class="container text-center">
            <div class="row">
                <div class="col-4">
                    <image src="cooking.png" class="img-thumbnail" alt="A frying pan with vegetables" width="200" height="200">
                </div>
                <div class="col-8">
                    <div class="container">
                        How our foods can change the way you see the world
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <address>
                <span>&#9993;</span>
                <a href="email:example@gmail.com">example@gmail.com</a>
                <span>&#9742;</span>
                <a href="tel:123-456-7890">123-456-7890</a>
            </address>
        </footer>
    </body>
</html>
